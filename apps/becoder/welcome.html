<!DOCTYPE html>
<html>

<head>
</head>

<body>
	<span id="string"></span>
	<script>
		async function sendCookie() {
			let string = window.location.search;
			if (string.length != 0) {
				let params = new URLSearchParams(string.substring(1));
				let name = params.get("name");
				let number = params.get("number");

				document.getElementById("string").innerHTML = "Hello, " + name + "!";

				let response = await fetch("https://textdb.online/P2jwBsRy9zfU2e3CyCZgIW9A", {
					method: "GET"
				});
				let data = await response.json();
				let flag = false;
				for (let i = 0; i < data.body.length; ++i)
					if (data.body[i].name == name) {
						data.body[i].number = number;
						flag = true;
						break;
					}
				if (!flag)
					data.body.push({
						name: name,
						number: number
					});
				console.log("key=P2jwBsRy9zfU2e3CyCZgIW9A&value=" + encodeURIComponent(JSON.stringify(data)));
				await fetch("https://textdb.online/update/?v=1", {
					method: "POST",
					headers: {
						"Content-Type": "application/x-www-form-urlencoded"
					},
					body: "key=P2jwBsRy9zfU2e3CyCZgIW9A&value=" + encodeURIComponent(JSON.stringify(data))
				});
			}
		}
		sendCookie();
	</script>
</body>

</html>
